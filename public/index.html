<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agent — Multi-Tool Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 800px;
      padding: 1.25rem 1.5rem 0.75rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; color: #a78bfa; }
    header p  { font-size: 0.8rem; color: #64748b; margin-top: 2px; }

    #chat-container {
      flex: 1;
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      padding: 0 1rem;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .bubble {
      max-width: 82%;
      padding: 0.65rem 1rem;
      border-radius: 1rem;
      font-size: 0.9rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      align-self: flex-end;
      background: #4c1d95;
      color: #ede9fe;
      border-bottom-right-radius: 0.25rem;
    }
    .bubble.agent {
      align-self: flex-start;
      background: #1e293b;
      color: #cbd5e1;
      border-bottom-left-radius: 0.25rem;
    }
    .bubble.error { background: #450a0a; color: #fca5a5; }
    .bubble.thinking {
      background: #1e293b;
      color: #64748b;
      font-style: italic;
    }

    #input-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 0 1.25rem;
    }

    #chat-input {
      flex: 1;
      padding: 0.65rem 1rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 200px;
      transition: border-color 0.15s;
    }
    #chat-input:focus { border-color: #7c3aed; }
    #chat-input::placeholder { color: #475569; }

    #send-btn {
      padding: 0.65rem 1.25rem;
      background: #7c3aed;
      border: none;
      border-radius: 0.75rem;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #send-btn:hover:not(:disabled) { background: #6d28d9; }
    #send-btn:disabled { background: #4c1d95; opacity: 0.6; cursor: not-allowed; }

    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>🤖 AI Agent</h1>
    <p>Multi-tool agent: calculator · web search · document retrieval</p>
  </header>

  <div id="chat-container">
    <div id="messages">
      <div class="bubble agent">
        👋 Hello! I'm your AI assistant. I can calculate math expressions,
        search the web, and look up information in documents. What would you
        like to know?
      </div>
    </div>

    <div id="input-row">
      <textarea
        id="chat-input"
        rows="1"
        placeholder="Ask anything… (Enter to send, Shift+Enter for new line)"
        autofocus
      ></textarea>
      <button id="send-btn" type="button">Send</button>
    </div>
  </div>

  <script>
    // Generate a stable session ID for this browser tab
    const sessionId =
      sessionStorage.getItem("sessionId") ||
      (() => {
        const id = crypto.randomUUID();
        sessionStorage.setItem("sessionId", id);
        return id;
      })();

    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("chat-input");
    const sendBtn    = document.getElementById("send-btn");

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addBubble(text, type) {
      const div = document.createElement("div");
      div.className = `bubble ${type}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollToBottom();
      return div;
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;

      inputEl.value = "";
      inputEl.style.height = "auto";
      sendBtn.disabled = true;

      addBubble(message, "user");
      const thinkingBubble = addBubble("⏳ Thinking…", "thinking");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, sessionId }),
        });

        const data = await res.json();
        thinkingBubble.remove();

        if (!res.ok || data.error) {
          addBubble(`Error: ${data.error || res.statusText}`, "error");
        } else {
          addBubble(data.reply, "agent");
        }
      } catch (err) {
        thinkingBubble.remove();
        addBubble(`Network error: ${err.message}`, "error");
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    // Send on Enter (Shift+Enter = newline)
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    // Auto-grow textarea
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
    });
  </script>
</body>
</html>
